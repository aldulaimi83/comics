<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="white"/>

  <!-- Left arm of Y — diagonal strip upper-left to center -->
  <polygon points="3,3 43,3 53,46 13,46" fill="#CACACA"/>
  <polygon points="3,3 43,3 53,46 13,46" fill="url(#leftShine)"/>

  <!-- Right arm of Y — diagonal strip upper-right to center -->
  <polygon points="57,3 97,3 87,46 47,46" fill="#DCDCDC"/>
  <polygon points="57,3 97,3 87,46 47,46" fill="url(#rightShine)"/>

  <!-- Stem — vertical strip going down, with slanted bottom-left -->
  <polygon points="39,49 61,49 61,97 39,80" fill="#C8C8C8"/>
  <!-- Triangle notch cut from bottom-left of stem -->
  <polygon points="39,80 39,97 24,97" fill="white"/>

  <!-- Subtle shading overlays for 3D look -->
  <defs>
    <linearGradient id="leftShine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rightShine" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
</svg>
